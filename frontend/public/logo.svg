<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" fill="none">
  <!-- ═══ ICON ═══ -->
  <g transform="translate(4, 4)">

    <!-- Teal base ellipse (destination/globe base) -->
    <ellipse cx="42" cy="79" rx="19" ry="7.5" fill="#00C2D4" opacity="0.9"/>

    <!-- Orange outer orbit swoosh — large arc, ~300° -->
    <path
      d="M 68 26
         A 34 34 0 1 0 70 60"
      stroke="#F7941D" stroke-width="7.5" fill="none"
      stroke-linecap="round"/>

    <!-- Orange arrowhead at end of swoosh -->
    <polygon points="70,60 82,54 68,48" fill="#F7941D"/>

    <!-- Small inner navy arc (secondary orbit line) -->
    <path
      d="M 56 18 A 24 24 0 0 0 18 56"
      stroke="#1B2E70" stroke-width="3" fill="none"
      stroke-linecap="round" opacity="0.6"/>

    <!-- Airplane body (navy, angled ~-45°) -->
    <g transform="translate(41,44) rotate(-42)">
      <!-- Fuselage -->
      <ellipse cx="0" cy="0" rx="14" ry="4.5" fill="#1B2E70"/>
      <!-- Left (lower) wing -->
      <polygon points="-3,-2  -15,12  4,3" fill="#1B2E70"/>
      <!-- Right (upper) wing -->
      <polygon points="3,2  15,-12  -4,-3" fill="#1B2E70"/>
      <!-- Tail left -->
      <polygon points="-11,1  -18,9  -8,3" fill="#1B2E70"/>
      <!-- Nose cone -->
      <ellipse cx="13" cy="-0.5" rx="3" ry="2.5" fill="#1B2E70"/>
    </g>

  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "Manzil" — bold orange -->
  <text
    x="100" y="57"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-size="44"
    font-weight="800"
    fill="#F7941D"
    letter-spacing="-1.5"
  >Manzil</text>

  <!-- "CONSULTANCY" — spaced charcoal -->
  <text
    x="102" y="78"
    font-family="'Segoe UI', 'Arial', sans-serif"
    font-size="13"
    font-weight="500"
    fill="#3A3A3A"
    letter-spacing="5"
  >CONSULTANCY</text>
</svg>
