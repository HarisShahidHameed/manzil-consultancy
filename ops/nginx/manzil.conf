# Nginx site config for Manzil — serves the built frontend as static files and
# reverse-proxies /api to the PM2-managed Node backend on 127.0.0.1:5000.
#
# Install:
#   sudo cp ops/nginx/manzil.conf /etc/nginx/sites-available/manzil
#   sudo ln -s /etc/nginx/sites-available/manzil /etc/nginx/sites-enabled/manzil
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot (see docs/DEPLOYMENT.md) to add the HTTPS server block —
# certbot --nginx will edit this file in place to add TLS + the 80->443 redirect.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_HERE;

    # Static frontend build — `current` is a symlink flipped atomically on each deploy.
    root /opt/manzil/current/frontend/dist;
    index index.html;

    # Small VPS: keep gzip on, keep buffers modest.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 5m;

    # Static assets — hashed filenames from Vite, safe to cache hard.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxied to the Node backend managed by PM2.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
